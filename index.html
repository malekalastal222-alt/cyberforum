<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1><i class="fas fa-cloud"></i> Weather Dashboard</h1>
            <p>Get Real-time Weather Information</p>
        </header>

        <!-- Search Section -->
        <div class="search-section">
            <input 
                type="text" 
                id="cityInput" 
                placeholder="Enter city name..." 
                class="search-input"
            >
            <button id="searchBtn" class="search-btn">
                <i class="fas fa-search"></i> Search
            </button>
            <button id="geolocationBtn" class="location-btn">
                <i class="fas fa-map-marker-alt"></i> My Location
            </button>
        </div>

        <!-- Current Weather Section -->
        <div class="current-weather" id="currentWeather">
            <div class="weather-card">
                <div class="city-info">
                    <h2 id="cityName">--</h2>
                    <p id="weatherDescription">--</p>
                    <p id="dateTime">--</p>
                </div>
                <div class="weather-main">
                    <img id="weatherIcon" src="" alt="Weather Icon" class="weather-icon">
                    <div class="temperature">
                        <span id="temperature">--</span>
                        <span class="unit">°C</span>
                    </div>
                </div>
                <div class="weather-details">
                    <div class="detail">
                        <i class="fas fa-tint"></i>
                        <span>Humidity: <strong id="humidity">--</strong>%</span>
                    </div>
                    <div class="detail">
                        <i class="fas fa-wind"></i>
                        <span>Wind: <strong id="windSpeed">--</strong> m/s</span>
                    </div>
                    <div class="detail">
                        <i class="fas fa-compress"></i>
                        <span>Pressure: <strong id="pressure">--</strong> mb</span>
                    </div>
                    <div class="detail">
                        <i class="fas fa-eye"></i>
                        <span>Visibility: <strong id="visibility">--</strong> km</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Hourly Forecast -->
        <div class="forecast-section">
            <h3>Hourly Forecast</h3>
            <div class="hourly-forecast" id="hourlyForecast">
                <!-- Hourly items will be inserted here -->
            </div>
        </div>

        <!-- 5-Day Forecast -->
        <div class="forecast-section">
            <h3>5-Day Forecast</h3>
            <div class="daily-forecast" id="dailyForecast">
                <!-- Daily items will be inserted here -->
            </div>
        </div>

        <!-- Search History -->
        <div class="history-section">
            <h3>Recent Searches</h3>
            <div class="search-history" id="searchHistory">
                <!-- History items will be inserted here -->
            </div>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="error-message"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
